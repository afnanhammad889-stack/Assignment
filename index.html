<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza Horizon 7 - Coming Soon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Forza Horizon 6</h1>
        <p>The ultimate racing adventure awaits!</p>
        <div id="countdown">
            <div class="time">
                <span id="days">00</span>
                <p>Days</p>
            </div>
            <div class="time">
                <span id="hours">00</span>
                <p>Hours</p>
            </div>
            <div class="time">
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>
            <div class="time">
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>
        <p>Release Date: May 19, 2026</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
